version: '3.8'

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: clara-n8n
    ports:
      - "5678:5678"
    env_file:
      - .env
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=clara
      - N8N_BASIC_AUTH_PASSWORD=clara2024
      - GENERIC_TIMEZONE=America/New_York
      - N8N_SECURE_COOKIE=false
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_RESTRICT_FILE_ACCESS_TO=/home/node
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - NODE_FUNCTION_ALLOW_BUILTIN=*
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/home/node/workflows
      - ./scripts:/home/node/scripts
      - ./dataset:/home/node/dataset
      - ./outputs:/home/node/outputs
      - ./changelog:/home/node/changelog
      - ./node_modules:/home/node/scripts/node_modules
    restart: unless-stopped

volumes:
  n8n_data:
